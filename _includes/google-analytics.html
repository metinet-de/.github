<!-- Google Analytics 4 – Consent Mode v2 (DSGVO-konform) -->
<!-- Lädt gtag.js, startet aber mit "denied"-Status für alle Storage-Typen.
     Erst nach expliziter Nutzer-Zustimmung wird auf "granted" umgeschaltet. -->
<script>
  // Consent-Zustand aus localStorage lesen (gesetzt vom Consent-Banner)
  var gaConsent = localStorage.getItem('ga_consent');

  // gtag-Hilfsfunktion
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }

  // Consent Mode v2: Standardmäßig alles verweigert (DSGVO-Default für EU)
  gtag('consent', 'default', {
    'ad_storage':             'denied',
    'analytics_storage':      gaConsent === 'granted' ? 'granted' : 'denied',
    'ad_user_data':           'denied',
    'ad_personalization':     'denied',
    'wait_for_update':        500
  });

  gtag('js', new Date());
  gtag('config', '{{ site.google_analytics }}', {
    'anonymize_ip': true
  });
</script>
<!-- Lädt das gtag.js Script asynchron -->
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics }}"></script>
