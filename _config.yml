# Site settings
title: metinet.de
email: info@metinet.de
description: >- # this means to ignore newlines until "baseurl:"
  A personal tech hub exploring software development, agentic AI and open-source projects.

baseurl: "" # the subpath of your site, e.g. /blog
url: "https://metinet.de" # the base hostname & protocol for your site
logo: "/assets/images/logo-metinetde.png"

# Author
author:
  name: Metin Özkan
  email: info@metinet.de
  linkedin: metin-oezkan
  github: metinet-de
  location: Berlin, Germany

# Blog settings
blog:
  path: "/blog"
  title: "metinet.de Blog"
  description: "Insights on AI, Software Development, and Technology"

# Build settings
markdown: kramdown
highlighter: rouge
theme: minima
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - Makefile
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - tailwind.config.js
  - package.json
  - package-lock.json
  - assets/css/input.css
  - AGENTS.md
  - ANALYTICS_SETUP.md
  - CONTRIBUTING.md
  - DOMAIN_SETUP.md
  - I18N.md
  - README.md
  - SECURITY.md
  - SETUP.md

# Internationalization
languages: ["en", "de"]
default_lang: "de"

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Defaults
defaults:
  # All pages default to German
  - scope:
      path: ""
    values:
      lang: "de"
  # All posts default to German
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      lang: "de"
      permalink: /blog/:year/:month/:day/:title/
  # German pages (under de/ directory)
  - scope:
      path: "de"
    values:
      lang: "de"
  # Blog section
  - scope:
      path: "blog"
    values:
      layout: "page"
  # German blog section
  - scope:
      path: "de/blog"
    values:
      layout: "page"
      lang: "de"

# Pagination
paginate: 5
paginate_path: "/blog/page:num/"

# Analytics & Search Console
# Trage hier deine GA4 Measurement ID ein (Format: G-XXXXXXXXXX)
google_analytics: "G-L38P4V2SD4"
# Trage hier deinen Google Search Console Verification Code ein
# (nur den Content-Wert des Meta-Tags, z.B. "abc123xyz")
google_site_verification: "2JEAESeWwKeQpRHKTls0NWjDLwHWiaOstvUIT1WJ_98"

# SEO
twitter:
  username: # Add if you have Twitter
  card: summary

facebook:
  app_id: # Add if you have Facebook
  publisher: # Add if you have Facebook

social:
  name: Metin Özkan
  links:
    - https://www.linkedin.com/in/metin-oezkan/
    - https://github.com/metinet-de
    - https://www.xing.com/profile/Metin_Oezkan/